<!DOCTYPE html>
<html>
<head>
    <title>Course Registration Form</title>
</head>
<body>
    <h1> Course Registration</h1>

    <form>
        <label for="name">Full Name:</label><br>
        <input type="text" id="name" name="name"><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email"><br><br>

        <label for="age">Age:</label><br>
        <input type="number" id="age" name="age"><br><br>
        <label for="phone number">Phone number:</label><br>
        <input type="phone number" id="phone number" name="phone number"><br><br>
                <label for="COllege">College Name:</label><br>
        <input type="text" id="name" name="name"><br><br>

        <input type="radio" id="male" name="gender" value="Male">
        <label for="male">Male</label><br>

        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label><br>

        <input type="radio" id="other" name="gender" value="Other">
        <label for="other">Other</label><br><br>

        <label for="department">Select Department:</label><br>
     <select name="department" id="department">
      <option value="CSE">CSE</option>
      <option value="CAI">CAI</option>
      <option value="CSC">CSC</option>
      <option value="CST">CST</option>
      <option value="CSD">CSD</option>
      <option value="ECE">ECE</option>
      <option value="EEE">EEE</option>
      <option value="CIVIL">CIVIL</option>
      <option value="MECH">MECH</option>
       </select><br />

        <label for="course">Select Course:</label><br>
        <select id="course" name="course">
            <option value="java FullStack">Java Fullstack</option>
            <option value="Python FUllstack">Python Fullstack </option>
            <option value="promt Engineering">Promt Engineering</option>
            <option value="VLSI">VLSI</option>
            <option value="Robotics">Robotics</option>
            <option value="Embeddded">Embedded</option>
            <option value="CAD/CAM">CAD/CAM</option>
            <option value="data analaytics">data analaytics</option>
        </select><br><br>

         <label for="start">Start Date:</label><br>
        <input type="date" id="start" name="start"><br><br>

        <label for="end">End Date:</label><br>
        <input type="date" id="end" name="end"><br><br>
        <label for="semester">Select Semester:</label><br><br>
        <select id="semester" name="semester">
            <option value="sem1">Semester 1</option>
            <option value="sem2">Semester 2</option>
            <option value="sem3">Semester 3</option>
            <option value="sem4">Semester 4</option>
            <option value="sem5">Semester 5</option>
            <option value="sem6">Semester 6</option>
            <option value="sem7">Semester 7</option>
            <option value="sem8">Semester 8</option>
        </select><br><br>

        <input type="submit" value="Register">
    </form>
</body>
</html>
